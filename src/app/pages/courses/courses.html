<div class="table-card">
  <h2>📚 Courses</h2>
  <table class="dark-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Order</th>
        <th>Image</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let course of (courses$ | async)?.data; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ course.name }}</td>
        <td><span class="badge-order">{{ course.order }}</span></td>
        <td>
          <img *ngIf="course.imageUrl"
            [src]="'https://itkalemsign.runasp.net' + course.imageUrl"
            class="table-img">
          <span *ngIf="!course.imageUrl" class="empty-cell">—</span>
        </td>
        <td>
          <button class="btn-edit"   (click)="openEditModal(course)">✏ Edit</button>
          <button class="btn-delete" (click)="deleteCourse(course.id!)">✕ Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Modal Edit -->
<div class="modal-overlay" *ngIf="showModal" (click)="resetForm()">
  <div class="modal-box" (click)="$event.stopPropagation()">

    <div class="modal-box-header">
      <h5>✏ Edit Course</h5>
      <button class="modal-close" (click)="resetForm()">✕</button>
    </div>

    <div class="modal-box-body">
      <form [formGroup]="courseForm" (ngSubmit)="submit()">

        <div class="form-group">
          <label>Name</label>
          <input type="text" formControlName="name" placeholder="Enter course name">
        </div>

        <div class="form-group">
          <label>Order</label>
          <input type="number" formControlName="order">
        </div>

        <div class="form-group">
          <label>Level ID</label>
          <input type="text" formControlName="levelId">
        </div>

        <div class="form-group">
          <label>Category ID</label>
          <input type="text" formControlName="categoryId">
        </div>

        <div class="form-group">
          <label>Image <span style="color:#4a5568">(optional)</span></label>
          <input type="file" (change)="onFileSelected($event)">
          <div *ngIf="previewImage" class="preview-box" style="margin-top:12px">
            <img [src]="previewImage" width="120">
          </div>
        </div>

        <div>
          <button type="submit" class="btn-success-dark" [disabled]="courseForm.invalid">✓ Update</button>
          <button type="button" class="btn-cancel-dark" (click)="resetForm()">Cancel</button>
        </div>

      </form>
    </div>

  </div>
</div>
