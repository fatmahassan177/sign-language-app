<div class="login-page">
  <div class="login-card">

    <div class="login-brand">
      <span class="login-brand-icon">🤟</span>
      <h1 class="login-brand-name">ITKALEM SIGN</h1>
      <p class="login-subtitle">Admin Dashboard</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="admin@example.com">
        <small *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          Please enter a valid email
        </small>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••">
        <small *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Password must be at least 6 characters
        </small>
      </div>

      <div class="login-error" *ngIf="errorMessage">
        ✕ {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="loading" class="login-btn">
        <span *ngIf="!loading">Login →</span>
        <span *ngIf="loading">Logging in...</span>
      </button>

    </form>

  </div>
</div>
